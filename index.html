<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدولي — الدعم الفني | سراب غيم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2D6A4F;
    --green-light: #52B788;
    --green-pale: #D8F3DC;
    --gold: #E9C46A;
    --dark: #1B1B1B;
    --gray: #6B7280;
    --bg: #FAFAF8;
    --white: #FFFFFF;
    --radius: 16px;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    direction: rtl;
  }

  /* ── Header ── */
  header {
    background: var(--green);
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 240px; height: 240px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -40px;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .app-icon {
    width: 88px; height: 88px;
    background: var(--white);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 44px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    position: relative; z-index: 1;
  }

  header h1 {
    font-size: 32px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.5px;
    position: relative; z-index: 1;
  }

  header p {
    font-size: 15px;
    color: rgba(255,255,255,0.72);
    margin-top: 6px;
    font-weight: 300;
    position: relative; z-index: 1;
  }

  .badge {
    display: inline-block;
    margin-top: 14px;
    background: rgba(255,255,255,0.15);
    color: var(--white);
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 99px;
    letter-spacing: 0.3px;
    position: relative; z-index: 1;
  }

  /* ── Main ── */
  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  /* ── Contact Card ── */
  .contact-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }

  .contact-card-header {
    background: var(--green-pale);
    padding: 16px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 0.2px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    border-bottom: 1px solid #F0F0EE;
    text-decoration: none;
    color: var(--dark);
    transition: background 0.15s;
  }
  .contact-item:last-child { border-bottom: none; }
  .contact-item:hover { background: #F7F7F5; }

  .contact-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .icon-wa  { background: #E8F9EF; }
  .icon-mail { background: #EEF2FF; }

  .contact-text strong {
    display: block;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .contact-text span {
    font-size: 13px;
    color: var(--gray);
    font-weight: 300;
  }

  .contact-arrow {
    margin-right: auto;
    margin-left: 0;
    color: var(--gray);
    font-size: 18px;
    transform: scaleX(-1);
  }

  /* ── Info Cards ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .info-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
    text-align: center;
  }

  .info-card .info-icon { font-size: 28px; margin-bottom: 8px; }
  .info-card h3 { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .info-card p { font-size: 12px; color: var(--gray); line-height: 1.5; font-weight: 300; }

  /* ── FAQ ── */
  .faq-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }

  .faq-header {
    background: var(--green-pale);
    padding: 16px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
  }

  .faq-item {
    padding: 16px 20px;
    border-bottom: 1px solid #F0F0EE;
  }
  .faq-item:last-child { border-bottom: none; }

  .faq-q {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .faq-q::before {
    content: 'س';
    background: var(--green);
    color: white;
    font-size: 11px;
    width: 20px; height: 20px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .faq-a {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.65;
    padding-right: 28px;
    font-weight: 300;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--gray);
    font-weight: 300;
  }

  footer strong { color: var(--dark); font-weight: 500; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .info-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 26px; }
  }
</style>
</head>
